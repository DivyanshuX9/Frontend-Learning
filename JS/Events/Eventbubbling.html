<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .child{
            background-color: aliceblue;
            margin: 25px;
            padding: 25px;
            cursor: pointer;
        }
        .childContainer{
                background-color: rgb(42, 5, 66);
                margin: 25px;
                padding: 25px;
            
        }
        .container{
            background-color: rgb(42, 179, 7);
            margin: 25px;
            padding: 25px;
        
    }
    </style>
</head>
<body>
    <div class="container">
        <section class="childContainer">
            <div class="child">
                I am a child
            </div>
        </section>
    </div>
    <script>
        document.querySelector(".child").addEventListener("click",(e)=>{
            e.stopPropagation(); // to stop calling out parent
            alert("Child Was clicked")
            console.log(e,e.key);
       })

       document.querySelector(".childContainer").addEventListener("click",(e)=>{
        e.stopPropagation(); // to stop calling out parent
        alert("ChildContainer Was clicked")
   })

   document.querySelector(".container").addEventListener("click",(e)=>{
    e.stopPropagation(); // to stop calling out parent
    alert("Container Was clicked")
})


function getRandomColor(){

   
        let randomValue1 = Math.floor(Math.random() * 255);
        let randomValue2 = Math.floor(Math.random() * 255);
        let randomValue3 = Math.floor(Math.random() * 255);
    
       return `rgb(${randomValue1}, ${randomValue2}, ${randomValue3})`;
}

//setInterval(()=>{
//    document.querySelector(".childContainer").style.backgroundColor=  getRandomColor()
//},1000)

setTimeout(()=>{// runs only one time to change after a certain period of time
    document.querySelector(".childContainer").style.backgroundColor=  getRandomColor()
},1000)


    </script>
</body>
</html>
