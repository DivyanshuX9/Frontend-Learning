<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <style>
        *{
            background-color: ivory;
     
        }
        .container{
            margin: 20px;
            height: 1050px;
            width: 650px;
            padding: 12px;
            padding-bottom: 40px;
            border: 2px solid black;
            border-radius: 30px;
            background-color:white;
            box-shadow: 5px 10px 5px grey;
  
        }
        .image{ 
            position: relative;
            left:7px;
            padding:0px;
            margin: 10px;
            margin-top: 10px;
            margin-bottom: 15px;
            border-image: 5px solid black;
            background-color: white;
        }
        .image img{
            border-radius: 15px;
        }
        .box{
            font-size: 30px;
            margin:10px;
            padding: 8px;
            border: 2px solid black;
            border-radius: 20px;
            background-color: white;
        }
        
        .Heading {
            margin:10px;
            margin-top: 20px;
            font:bold;
            font-size: 52px;
            background-color: white;
        }
        .detail {
            font-size: 30px;
            margin:12px;
            font-family: "Roboto", sans-serif;
            font-weight: 300;
            font-style: normal;
            margin-bottom:45px ;
            background-color: white;
        }
        .read{
            position: relative;
            border: 8px solid cyan;
            border-radius: 30px;
            margin: 10px;
            margin-bottom: 50px;
            padding:10px;
            font-size: 32px solid blue;
            font-size: 30px;
            background-color:cyan;
            left:250px;
           
        }

    </style>
</head>

<body>
    <div class="container">
        <div class="image"><img src="https://img.freepik.com/premium-photo/landscape-photo-lake_665280-27623.jpg?size=626&ext=jpg"></div>
        <span class="box box1">Nature</span>
        <span class="box box2">Lake</span>
        <div class="Heading">Lago di Braies</div>
        <div class="detail">Lorem ipsum, dolor sit amet consectetur adipisicing elit. Illum atque sit voluptatem eveniet
            incidunt delectus iste alias, corrupti omnis nobis cupiditate, perspiciatis saepe, fuga veniam.</div>
           <span class="read">Read Me</span>
    </div>

</body>

</html>
