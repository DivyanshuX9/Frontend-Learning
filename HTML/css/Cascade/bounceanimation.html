<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            width:80vw;
            height: 80vh;
            background-color: aqua;
        }
        .ball{
            width: 121px;
            height: 121px;
            border-radius: 50%;
            background-color: red;
            position: absolute;
            left: 0;
            bottom: 0;
            /* animation:  duration timing-function delay iteration-count direction fill-mode; */
            animation: myanimX 3s linear infinite alternate,myanimY 1s ease-in infinite alternate ;
        }
        @keyframes myanimX{
            from{
                left:0;
            }
            to{
                left: 100%;
            }}
            @keyframes myanimY{
            from{
                bottom:0;
            }
            to{
                bottom: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ball">
        </div>
    </div>
</body>
</html>
