<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            border: 2px solid black;
            margin: 34px;
            padding: 32px;
            box-shadow: 5px 15px 5px gray;
        }
        .text-shadow{
            text-shadow: 2px 2px 4px red;
            border: 2px solid green;
            border-radius:34px ;
            outline: 5px solid black;
        }
    </style>
</head>

<body>
    <div class="box">Cheetah hi keh deh</div>
    <div class="text-shadow">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Dicta deserunt, eveniet natus pariatur nemo quos
        necessitatibus iure omnis eligendi, esse enim molestias vero! Pariatur ipsum eum nostrum quia esse reprehenderit
        sapiente impedit.
    </div>
</body>

</html>
